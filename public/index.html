<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>dockfe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #0a1020;
    --bg-2:         #0d1426;
    --panel:        #111a30;
    --panel-hover:  #16213d;
    --panel-icon:   #1a2544;
    --border:       #1d2742;
    --border-2:     #243154;
    --ink:          #e6edf7;
    --ink-dim:      #94a3b8;
    --ink-faint:    #5c6a85;
    --accent:       #60a5fa;
    --accent-dim:   #3b6eb5;
    --live:         #4ade80;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background:
      radial-gradient(ellipse 60% 30% at 50% 0%, rgba(96, 165, 250, 0.06), transparent 70%),
      var(--bg);
    color: var(--ink);
    font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'ss01', 'ss02';
  }

  .wrap {
    max-width: 1280px;
    margin: 0 auto;
    padding: 56px 32px 80px;
  }

  /* Masthead */
  .mast {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 32px;
    gap: 24px;
  }
  .mast h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .mast h1 .dim { color: var(--ink-faint); font-weight: 400; }
  .mast p {
    margin: 6px 0 0;
    font-size: 13px;
    color: var(--ink-dim);
  }
  .mast .meta {
    text-align: right;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: flex-end;
  }
  .mast .meta .live-dot {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--ink-dim);
  }
  .mast .meta .live-dot::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--live);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(74, 222, 128, 0.6);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }

  /* Search */
  .search {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--ink);
    font-family: inherit;
    font-size: 14px;
    margin-bottom: 28px;
    outline: none;
    transition: border-color 160ms ease;
  }
  .search:focus { border-color: var(--accent-dim); }
  .search::placeholder { color: var(--ink-faint); }

  /* Section */
  .section {
    margin-top: 32px;
  }
  .section:first-of-type { margin-top: 0; }
  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 14px;
  }
  .section-label .name { color: var(--ink-dim); }
  .section-label .count {
    font-family: 'Geist Mono', ui-monospace, monospace;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
  }
  .section-label .line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }

  /* Bookmark card */
  .bm {
    display: flex;
    align-items: stretch;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: background 160ms ease, border-color 160ms ease;
  }
  .bm:hover {
    background: var(--panel-hover);
    border-color: var(--border-2);
  }
  .bm:hover .bm-icon { background: #20305a; }
  .bm:hover .bm-name { color: var(--accent); }

  .bm-icon {
    width: 56px;
    flex-shrink: 0;
    background: var(--panel-icon);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    transition: background 160ms ease;
  }
  .bm-icon img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }
  .bm-icon .fallback {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-weight: 500;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.04em;
  }

  .bm-body {
    flex: 1;
    min-width: 0;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
  }
  .bm-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.005em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 160ms ease;
  }
  .bm-desc {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    color: var(--ink-faint);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bm-desc .url { color: var(--ink-dim); }
  .bm-desc .src {
    display: inline-block;
    padding: 0 5px;
    margin-right: 6px;
    border-radius: 3px;
    background: rgba(96, 165, 250, 0.12);
    color: var(--accent);
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
    vertical-align: 1px;
  }
  .bm-desc .src.port { background: rgba(255,255,255,0.04); color: var(--ink-faint); }

  /* Empty / error */
  .panel {
    border: 1px dashed var(--border-2);
    border-radius: 8px;
    padding: 48px 24px;
    text-align: center;
    color: var(--ink-dim);
  }
  .panel h3 {
    margin: 0 0 6px;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
  }
  .panel p {
    margin: 0;
    font-size: 13px;
    color: var(--ink-dim);
  }
  .panel code {
    display: inline-block;
    margin-top: 10px;
    padding: 4px 10px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    color: var(--ink-dim);
  }

  @media (max-width: 640px) {
    .wrap { padding: 32px 20px 56px; }
    .mast { flex-direction: column; align-items: flex-start; }
    .mast .meta { text-align: left; align-items: flex-start; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <main class="wrap">
    <header class="mast">
      <div>
        <h1>dockfe <span class="dim">·</span> <span class="dim" id="hostname">localhost</span></h1>
        <p>Running container frontends on this host.</p>
      </div>
      <div class="meta">
        <span class="live-dot" id="meta-count">— vessels</span>
        <span id="meta-synced">synced —</span>
      </div>
    </header>

    <input type="search" class="search" id="search" placeholder="Filter by name, image, project, hostname, or :port…" autocomplete="off" spellcheck="false">

    <div id="content"></div>
  </main>

  <script>
    const POLL_MS = 5000;
    const ICON_BASES = [
      'https://cdn.jsdelivr.net/gh/selfhst/icons/png',
      'https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png',
    ];

    const $ = (id) => document.getElementById(id);
    const content = $('content');
    const searchInput = $('search');
    let lastSynced = null;
    let allContainers = [];
    let filter = '';

    const host = () => window.location.hostname || 'localhost';
    const pad = (n, w = 2) => String(n).padStart(w, '0');

    function endpointUrl(e) {
      if (e.url) return e.url;
      if (e.port) {
        const scheme = (e.port.host === 443 || e.port.host === 8443) ? 'https' : 'http';
        return `${scheme}://${host()}:${e.port.host}`;
      }
      return '#';
    }

    function initialsFor(name) {
      const letters = (name || '').replace(/[^a-z0-9]/gi, '');
      return (letters.slice(0, 2) || '··').toUpperCase();
    }

    function iconElement(slug, name) {
      const wrap = document.createElement('div');
      wrap.className = 'bm-icon';
      const img = document.createElement('img');
      img.alt = '';
      img.referrerPolicy = 'no-referrer';
      img.loading = 'lazy';
      let idx = 0;
      const tryNext = () => {
        if (idx < ICON_BASES.length) {
          img.src = `${ICON_BASES[idx]}/${slug}.png`;
          idx += 1;
        } else {
          wrap.removeChild(img);
          const fb = document.createElement('span');
          fb.className = 'fallback';
          fb.textContent = initialsFor(name);
          wrap.appendChild(fb);
        }
      };
      img.onerror = tryNext;
      tryNext();
      wrap.appendChild(img);
      return wrap;
    }

    function shortImage(image) {
      return (image || '').split('@')[0].split('/').pop();
    }

    function displayName(c) {
      return c.service || c.name;
    }

    function searchableText(c) {
      const parts = [c.name, c.service, c.project, c.image, c.id];
      for (const e of c.endpoints) {
        parts.push(e.label || '');
        parts.push(e.source || '');
        if (e.url) parts.push(e.url);
        if (e.port) parts.push(`:${e.port.host}`);
      }
      return parts.join(' ').toLowerCase();
    }

    function renderBookmark(c) {
      const primary = c.endpoints[0];
      const a = document.createElement('a');
      a.className = 'bm';
      a.href = endpointUrl(primary);
      a.target = '_blank';
      a.rel = 'noopener';

      a.appendChild(iconElement(c.slug, displayName(c)));

      const body = document.createElement('div');
      body.className = 'bm-body';

      const name = document.createElement('div');
      name.className = 'bm-name';
      name.textContent = displayName(c);

      const desc = document.createElement('div');
      desc.className = 'bm-desc';
      const src = document.createElement('span');
      const sourceKey = primary.source || 'port';
      src.className = 'src' + (sourceKey === 'port' ? ' port' : '');
      src.textContent = sourceKey === 'nginx-proxy' ? 'nginx' : sourceKey;
      const url = document.createElement('span');
      url.className = 'url';
      const labels = c.endpoints.slice(0, 3).map(e => e.label).join(' ');
      const extra = c.endpoints.length > 3 ? ` +${c.endpoints.length - 3}` : '';
      url.textContent = `${labels}${extra}`;
      desc.append(src, url);

      body.append(name, desc);
      a.appendChild(body);
      return a;
    }

    function applyFilter() {
      const q = filter.trim().toLowerCase();
      const filtered = q
        ? allContainers.filter(c => searchableText(c).includes(q))
        : allContainers;

      content.innerHTML = '';

      if (allContainers.length === 0) {
        const div = document.createElement('div');
        div.className = 'panel';
        div.innerHTML = `<h3>No containers with reachable endpoints</h3><p>Start a container with a published port or proxy labels and it'll appear here.</p>`;
        content.appendChild(div);
        return;
      }

      if (filtered.length === 0) {
        const div = document.createElement('div');
        div.className = 'panel';
        div.innerHTML = `<h3>No matches</h3><p>Nothing matches the current filter.</p>`;
        content.appendChild(div);
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'grid';
      filtered.forEach(c => grid.appendChild(renderBookmark(c)));
      content.appendChild(grid);
    }

    function renderError(msg) {
      const div = document.createElement('div');
      div.className = 'panel';
      div.innerHTML = `<h3>Docker daemon unreachable</h3><p>Could not query running containers.</p><code></code>`;
      div.querySelector('code').textContent = msg;
      content.innerHTML = '';
      content.appendChild(div);
    }

    async function refresh() {
      try {
        const r = await fetch('/api/containers', { cache: 'no-store' });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
        allContainers = data.containers || [];
        lastSynced = new Date(data.syncedAt);
        $('meta-count').textContent = `${allContainers.length} ${allContainers.length === 1 ? 'vessel' : 'vessels'}`;
        applyFilter();
      } catch (err) {
        renderError(err.message || String(err));
      }
    }

    function tick() {
      $('hostname').textContent = host();
      if (lastSynced) {
        const ago = Math.max(0, Math.floor((new Date() - lastSynced) / 1000));
        $('meta-synced').textContent = `synced ${ago}s ago`;
      }
    }

    searchInput.addEventListener('input', (e) => {
      filter = e.target.value;
      applyFilter();
    });

    refresh();
    setInterval(refresh, POLL_MS);
    setInterval(tick, 1000);
    tick();
  </script>
</body>
</html>
